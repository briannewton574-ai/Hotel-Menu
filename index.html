<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Newton Hotel Menu</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
body{font-family:'Poppins', sans-serif;margin:0;background:#f4f4f4;}
header{background:#111;color:white;text-align:center;padding:20px;}
.menu{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;padding:20px;}
.card{background:white;border-radius:10px;overflow:hidden;box-shadow:0 5px 15px rgba(0,0,0,0.1);text-align:center;transition:transform 0.2s;}
.card:hover{transform:scale(1.03);}
.card img{width:100%;height:160px;object-fit:cover;}
.card h3{margin:10px 0;}
.price{color:#e67e22;font-weight:bold;}
.card button{background:#111;color:white;border:none;padding:10px;margin:10px;border-radius:5px;cursor:pointer;transition:background 0.2s;}
.card button:hover{background:#333;}
.cart{position:fixed;bottom:0;right:0;width:300px;background:white;box-shadow:0 -5px 15px rgba(0,0,0,0.1);padding:15px;max-height:90vh;overflow-y:auto;}
.cart h3{margin-top:0;}
input{width:100%;padding:8px;margin:5px 0;border-radius:5px;border:1px solid #ccc;}
.order-btn{background:#25D366;color:white;border:none;padding:12px;width:100%;font-size:16px;border-radius:6px;cursor:pointer;margin-top:10px;}
.order-btn:hover{background:#1ebe5d;}
.qty-btn{background:#e67e22;color:white;border:none;padding:2px 8px;margin:0 3px;border-radius:3px;cursor:pointer;}
.category-title{grid-column:1/-1;background:#eee;padding:5px 10px;border-radius:5px;margin-top:20px;font-weight:600;}
</style>
</head>
<body>

<header>
<h1>Newton Hotel Menu</h1>
</header>

<div class="menu" id="menu"></div>

<div class="cart">
<h3>Your Order</h3>
<div id="cartItems"></div>
<input id="name" placeholder="Customer Name">
<input id="table" placeholder="Table Number">
<input id="note" placeholder="Special Request (Optional)">
<button class="order-btn" onclick="sendOrder()">Order via WhatsApp</button>
</div>

<script>
// Load menu from localStorage or default
let menuItems = JSON.parse(localStorage.getItem('menuItems')) || [
  {name:'Chicken Biryani', price:450, img:'https://images.unsplash.com/photo-1604908176997-125f25cc6f3d', category:'Lunch'},
  {name:'Beef Pilau', price:400, img:'https://images.unsplash.com/photo-1631452180519-c014fe946bc7', category:'Lunch'},
  {name:'Chips & Chicken', price:500, img:'https://images.unsplash.com/photo-1604908177522-43259f7cbd0d', category:'Dinner'},
  {name:'Vegetable Curry', price:350, img:'https://images.unsplash.com/photo-1617196039805-21ecb12b8b2d', category:'Dinner'},
  {name:'Fish Fry', price:600, img:'https://images.unsplash.com/photo-1617196039985-333abbf3cba1', category:'Dinner'}
];

let cart = [];

function renderMenu(){
  const menuDiv = document.getElementById('menu');
  menuDiv.innerHTML = '';
  const categories = [...new Set(menuItems.map(i=>i.category))];
  categories.forEach(cat=>{
    const catTitle = document.createElement('div');
    catTitle.classList.add('category-title');
    catTitle.textContent = cat;
    menuDiv.appendChild(catTitle);
    menuItems.filter(i=>i.category===cat).forEach((item,index)=>{
      const card = document.createElement('div');
      card.classList.add('card');
      card.innerHTML=`
        <img src="${item.img}" alt="${item.name}">
        <h3>${item.name}</h3>
        <p class="price">Ksh ${item.price}</p>
        <button onclick="addToCart('${item.name}')">Add to Cart</button>
      `;
      menuDiv.appendChild(card);
    });
  });
}

function addToCart(name){
  const item = menuItems.find(i=>i.name===name);
  const cartItem = cart.find(i=>i.name===name);
  if(cartItem) cartItem.qty++;
  else cart.push({name:item.name, price:item.price, qty:1});
  displayCart();
}

function displayCart(){
  const cartDiv = document.getElementById('cartItems');
  cartDiv.innerHTML='';
  cart.forEach((item,i)=>{
    cartDiv.innerHTML+=`
      <p>${item.name} x${item.qty} 
      <button class="qty-btn" onclick="changeQty(${i},-1)">-</button>
      <button class="qty-btn" onclick="changeQty(${i},1)">+</button>
      <button class="qty-btn" onclick="removeItem(${i})">x</button>
      </p>
    `;
  });
}

function changeQty(i,change){
  cart[i].qty+=change;
  if(cart[i].qty<1) cart[i].qty=1;
  displayCart();
}

function removeItem(i){
  cart.splice(i,1);
  displayCart();
}

function sendOrder(){
  const name = document.getElementById('name').value;
  const table = document.getElementById('table').value;
  const note = document.getElementById('note').value;
  if(!name || !table || cart.length===0){alert('Please add items, enter name & table'); return;}
  let message=`Hello Newton Hotel,%0A%0ANew Order:%0A`;
  cart.forEach(item=>{message+=`${item.name} x${item.qty} (Ksh ${item.price*item.qty})%0A`;});
  const total = cart.reduce((acc,i)=>acc+i.price*i.qty,0);
  message+=`%0ATotal: Ksh ${total}%0ACustomer: ${name}%0ATable: ${table}`;
  if(note) message+=`%0ANote: ${note}`;
  const phone='254712345678'; // Replace with your WhatsApp number
  window.open(`https://wa.me/${phone}?text=${message}`);
}

renderMenu();
</script>

</body>
</html>
