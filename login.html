<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login - Newton Hotel</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
body{font-family:'Poppins',sans-serif;background:#f4f4f4;margin:0;display:flex;justify-content:center;align-items:center;height:100vh;}
form{background:white;padding:30px;border-radius:10px;box-shadow:0 5px 15px rgba(0,0,0,0.1);width:300px;}
input{width:100%;padding:10px;margin:10px 0;border-radius:5px;border:1px solid #ccc;}
button{width:100%;padding:10px;background:#111;color:white;border:none;border-radius:5px;cursor:pointer;}
button:hover{background:#333;}
</style>
</head>
<body>

<form id="loginForm">
<h2>Admin Login</h2>
<input type="text" id="username" placeholder="Username" required>
<input type="password" id="password" placeholder="Password" required>
<button type="submit">Login</button>
<p id="error" style="color:red;"></p>
</form>

<script>
// Set your admin credentials
const ADMIN_USERNAME = "admin";
const ADMIN_PASSWORD = "hotel123"; // Change to your password

const loginForm = document.getElementById('loginForm');
const errorMsg = document.getElementById('error');

loginForm.addEventListener('submit', function(e){
    e.preventDefault();
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;

    if(username === ADMIN_USERNAME && password === ADMIN_PASSWORD){
        localStorage.setItem("isAdmin","true"); // save login state
        window.location.href = "admin.html"; // redirect to admin panel
    } else {
        errorMsg.textContent = "Incorrect username or password!";
    }
});
</script>

</body>
</html>
